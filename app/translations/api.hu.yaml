developers:
  eyebrow: "Fejlesztők"
  title: "A LeagueOfDataBase API"
  intro: "REST JSON API az oldal közösségi adatai felett: nyilvános idézőprofilok, megosztott buildek és megtekintési trendek. Ingyen kipróbálható, valós terhelésre árazva."
  cta: "Kulcs létrehozása"
  cta_hint: "Jelentkezz be, generáld az ingyenes kulcsot, hívd az API-t — egy percen belül."
  docs_pricing: "Árak"
  auth:
    title: "Hitelesítés"
    body: "Minden /v1 kérés a kulcsodat viszi — formátum: %prefix% és 40 hexadecimális karakter — a két fejléc egyikében. A szerveren csak az SHA-256 ujjlenyomat tárolódik: az elveszett kulcsot újrageneráljuk, sosem állítjuk vissza."
    base_url: "Alap URL (v1, fejlesztés): %url% — az éles hozzáférés az oldal domainjén (TLS edge) keresztül lesz elérhető."
  endpoints:
    title: "Végpontok"
    healthz: "Szolgáltatás állapota — az egyetlen hitelesítés nélküli útvonal."
    profiles: "Egy tag nyilvános profilja: kedvencek és nyilvános buildek száma (privát profilnál 404)."
    builds: "Egy hős (Data Dragon id) nyilvános buildjei, a legújabbtól — lapozás page és per_page paraméterrel (max. 50)."
    trends: "Az oldal legnézettebb entitásai: hősök, tárgyak, rúnák vagy idézőikonok varázslatai — range=7d (alapértelmezett) vagy 30d, top 25."
    usage: "A hívó kulcs élő fogyasztása — hitelesített és sebességkorlátos, de sosem számít bele a keretbe."
  quotas:
    title: "Keretek és sebességkorlát"
    quota: "Minden kérés először a csomag havi keretét, majd az előre fizetett krediteket terheli; ha mindkettő elfogyott, az API 429 quota_exceeded választ ad."
    rate: "Kulcsonkénti token bucket: minden /v1 válasz tartalmazza az X-RateLimit-Limit, X-RateLimit-Remaining és X-RateLimit-Reset fejléceket; a korlát felett 429 rate_limited."
    month: "A keretek a naptári hónappal nullázódnak. Az éves csomagok a mennyiséget havi keretként hordozzák (havi 20 000 vagy 60 000 kérés)."
  errors:
    title: "Hibák"
    body: "Egységes boríték minden hibán. Kódok: unauthorized (401), forbidden (403, visszavont kulcs), not_found (404), rate_limited és quota_exceeded (429), invalid_request (400), internal (500/503)."
  manage:
    title: "Számlázás és kulcskezelés"
    body: "A kulcsokat a profilodból hozod létre és kezeled; a csomagokat és előfizetéseket a Stripe Checkout kezeli — maga az API sosem ér fizetési adatokhoz."
