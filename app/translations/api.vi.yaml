developers:
  eyebrow: "Lập trình viên"
  title: "API của LeagueOfDataBase"
  intro: "API REST JSON trên dữ liệu cộng đồng của trang: hồ sơ triệu hồi sư công khai, các build được chia sẻ và xu hướng lượt xem. Dùng thử miễn phí, có giá cho tải thực tế."
  cta: "Tạo khóa của tôi"
  cta_hint: "Đăng nhập, tạo khóa miễn phí, gọi API — chưa đến một phút."
  docs_pricing: "Bảng giá"
  auth:
    title: "Xác thực"
    body: "Mỗi yêu cầu /v1 mang khóa của bạn — định dạng %prefix% theo sau là 40 ký tự thập lục phân — trong một trong hai header. Máy chủ chỉ lưu dấu vân tay SHA-256: khóa mất chỉ được tạo lại, không bao giờ khôi phục."
    base_url: "URL gốc (v1, môi trường phát triển): %url% — truy cập production sẽ mở qua tên miền của trang (TLS edge)."
  endpoints:
    title: "Endpoint"
    healthz: "Tình trạng dịch vụ — tuyến duy nhất không cần xác thực."
    profiles: "Hồ sơ công khai của một thành viên: mục yêu thích và số build công khai (404 nếu hồ sơ riêng tư)."
    builds: "Các build công khai của một tướng (id Data Dragon), mới nhất trước — phân trang bằng page và per_page (tối đa 50)."
    trends: "Các mục được xem nhiều nhất trên trang: tướng, trang bị, ngọc bổ trợ hoặc phép triệu hồi — range=7d (mặc định) hoặc 30d, top 25."
    usage: "Mức dùng trực tiếp của khóa gọi — có xác thực và giới hạn tốc độ, nhưng không bao giờ tính vào hạn mức."
  quotas:
    title: "Hạn mức & giới hạn tốc độ"
    quota: "Mỗi yêu cầu được tính trước vào hạn mức tháng của gói, rồi đến tín dụng trả trước; hết cả hai, API trả về 429 quota_exceeded."
    rate: "Token bucket theo khóa: mỗi phản hồi /v1 mang X-RateLimit-Limit, X-RateLimit-Remaining và X-RateLimit-Reset; vượt giới hạn, 429 rate_limited."
    month: "Hạn mức đặt lại theo tháng dương lịch. Gói năm mang dung lượng dưới dạng hạn mức tháng (20.000 hoặc 60.000 yêu cầu mỗi tháng)."
  errors:
    title: "Lỗi"
    body: "Phong bì thống nhất cho mọi lỗi. Mã: unauthorized (401), forbidden (403, khóa bị thu hồi), not_found (404), rate_limited và quota_exceeded (429), invalid_request (400), internal (500/503)."
  manage:
    title: "Thanh toán & quản lý khóa"
    body: "Khóa được tạo và quản lý từ trang cá nhân; gói và thuê bao thanh toán qua Stripe Checkout — bản thân API không bao giờ chạm vào dữ liệu thanh toán."
