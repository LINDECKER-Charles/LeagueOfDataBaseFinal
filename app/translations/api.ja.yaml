developers:
  eyebrow: "開発者向け"
  title: "LeagueOfDataBase API"
  intro: "サイトのコミュニティデータを扱うREST JSON API:公開サモナープロフィール、共有ビルド、閲覧トレンド。試用は無料、実運用には有料プランを用意。"
  cta: "キーを作成"
  cta_hint: "ログインして無料キーを生成し、APIを呼び出すまで1分以内。"
  docs_pricing: "料金"
  auth:
    title: "認証"
    body: "すべての /v1 リクエストは、%prefix% に16進数40文字が続く形式のキーを、2つのヘッダーのいずれかで送ります。サーバー側にはSHA-256のフィンガープリントのみ保存:紛失したキーは再生成するしかありません。"
    base_url: "ベースURL(v1、開発環境): %url% — 本番アクセスはサイトのドメイン(TLSエッジ)経由で公開予定です。"
  endpoints:
    title: "エンドポイント"
    healthz: "サービスの状態 — 認証不要の唯一のルート。"
    profiles: "メンバーの公開プロフィール:お気に入りと公開ビルド数(非公開プロフィールは404)。"
    builds: "チャンピオン(Data Dragon id)の公開ビルド、新しい順 — page と per_page でページネーション(最大50)。"
    trends: "サイトで最も閲覧されたエンティティ:チャンピオン、アイテム、ルーン、サモナースペル — range=7d(既定)または 30d、上位25。"
    usage: "呼び出し元キーのリアルタイム使用量 — 認証とレート制限の対象ですが、クォータには一切カウントされません。"
  quotas:
    title: "クォータとレート制限"
    quota: "各リクエストはまずプランの月間クォータ、次にプリペイドクレジットに課金されます。両方尽きるとAPIは 429 quota_exceeded を返します。"
    rate: "キーごとのトークンバケット:すべての /v1 レスポンスに X-RateLimit-Limit、X-RateLimit-Remaining、X-RateLimit-Reset が付きます。超過時は 429 rate_limited。"
    month: "クォータは暦月でリセットされます。年額プランはボリュームを月間クォータとして持ちます(月20,000または60,000リクエスト)。"
  errors:
    title: "エラー"
    body: "全エラーで統一エンベロープ。コード:unauthorized(401)、forbidden(403、失効キー)、not_found(404)、rate_limited と quota_exceeded(429)、invalid_request(400)、internal(500/503)。"
  manage:
    title: "課金とキー管理"
    body: "キーの作成・管理はプロフィールから。パックとサブスクリプションはStripe Checkoutで決済 — API自体が決済データに触れることはありません。"
