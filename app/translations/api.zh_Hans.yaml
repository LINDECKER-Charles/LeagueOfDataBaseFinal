developers:
  eyebrow: "开发者"
  title: "LeagueOfDataBase API"
  intro: "一个基于站点社区数据的 REST JSON API:公开召唤师资料、共享出装与浏览趋势。免费试用,为真实负载提供付费方案。"
  cta: "创建我的密钥"
  cta_hint: "登录、生成免费密钥、调用 API — 不到一分钟。"
  docs_pricing: "价格"
  auth:
    title: "身份验证"
    body: "每个 /v1 请求都需在两种请求头之一中携带你的密钥 — 格式为 %prefix% 加 40 个十六进制字符。服务器端只保存其 SHA-256 指纹:丢失的密钥只能重新生成,无法找回。"
    base_url: "基础 URL(v1,开发环境): %url% — 生产环境将通过站点域名(TLS 边缘)开放。"
  endpoints:
    title: "接口"
    healthz: "服务健康状态 — 唯一无需认证的路由。"
    profiles: "成员的公开资料:收藏与公开出装数量(资料未公开时返回 404)。"
    builds: "某英雄(Data Dragon id)的公开出装,按最新排序 — 通过 page 与 per_page 分页(最多 50)。"
    trends: "站点浏览量最高的条目:英雄、装备、符文或召唤师技能 — range=7d(默认)或 30d,前 25 名。"
    usage: "调用密钥的实时用量 — 需要认证并受速率限制,但绝不计入配额。"
  quotas:
    title: "配额与速率限制"
    quota: "每次请求先记入方案的月度配额,再记入预付积分;两者耗尽后,API 返回 429 quota_exceeded。"
    rate: "按密钥的令牌桶:每个 /v1 响应都带有 X-RateLimit-Limit、X-RateLimit-Remaining 与 X-RateLimit-Reset;超限返回 429 rate_limited。"
    month: "配额随日历月重置。年付方案将额度按月度配额承载(每月 20,000 或 60,000 次)。"
  errors:
    title: "错误"
    body: "所有错误统一封装。代码:unauthorized(401)、forbidden(403,密钥已吊销)、not_found(404)、rate_limited 与 quota_exceeded(429)、invalid_request(400)、internal(500/503)。"
  manage:
    title: "计费与密钥管理"
    body: "密钥在个人资料中创建与管理;积分包与订阅通过 Stripe Checkout 支付 — API 本身绝不接触支付数据。"
