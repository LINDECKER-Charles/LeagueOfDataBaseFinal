developers:
  eyebrow: "Developer"
  title: "API LeagueOfDataBase"
  intro: "API REST JSON di atas data komunitas situs: profil summoner publik, build yang dibagikan, dan tren kunjungan. Gratis untuk dicoba, dihargai untuk beban nyata."
  cta: "Buat kunci saya"
  cta_hint: "Masuk, buat kunci gratis, panggil API — kurang dari satu menit."
  docs_pricing: "Harga"
  auth:
    title: "Autentikasi"
    body: "Setiap permintaan /v1 membawa kuncimu — format %prefix% diikuti 40 karakter heksadesimal — di salah satu dari dua header. Server hanya menyimpan sidik jari SHA-256-nya: kunci yang hilang dibuat ulang, tidak pernah dipulihkan."
    base_url: "URL dasar (v1, pengembangan): %url% — akses produksi akan dibuka lewat domain situs (TLS edge)."
  endpoints:
    title: "Endpoint"
    healthz: "Status layanan — satu-satunya rute tanpa autentikasi."
    profiles: "Profil publik seorang anggota: favorit dan jumlah build publik (404 jika profil privat)."
    builds: "Build publik sebuah champion (id Data Dragon), dari terbaru — dipaginasi lewat page dan per_page (maks. 50)."
    trends: "Entitas paling banyak dilihat di situs: champion, item, rune, atau summoner spell — range=7d (bawaan) atau 30d, 25 teratas."
    usage: "Pemakaian langsung kunci pemanggil — terautentikasi dan dibatasi laju, tapi tidak pernah dihitung ke kuota."
  quotas:
    title: "Kuota & batas laju"
    quota: "Tiap permintaan dibebankan dulu ke kuota bulanan paketmu, lalu ke kredit prabayar; jika keduanya habis, API menjawab 429 quota_exceeded."
    rate: "Token bucket per kunci: tiap respons /v1 membawa X-RateLimit-Limit, X-RateLimit-Remaining, dan X-RateLimit-Reset; melebihi batas, 429 rate_limited."
    month: "Kuota direset mengikuti bulan kalender. Paket tahunan membawa volumenya sebagai kuota bulanan (20.000 atau 60.000 permintaan per bulan)."
  errors:
    title: "Kesalahan"
    body: "Amplop seragam di semua kesalahan. Kode: unauthorized (401), forbidden (403, kunci dicabut), not_found (404), rate_limited dan quota_exceeded (429), invalid_request (400), internal (500/503)."
  manage:
    title: "Penagihan & pengelolaan kunci"
    body: "Kunci dibuat dan dikelola dari profilmu; paket dan langganan dibayar lewat Stripe Checkout — API-nya sendiri tidak pernah menyentuh data pembayaran."
