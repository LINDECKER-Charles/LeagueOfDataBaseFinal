developers:
  eyebrow: "Geliştiriciler"
  title: "LeagueOfDataBase API'si"
  intro: "Sitenin topluluk verileri üzerinde bir REST JSON API'si: herkese açık sihirdar profilleri, paylaşılan buildler ve görüntülenme eğilimleri. Denemesi ücretsiz, gerçek yükler için fiyatlandırılmış."
  cta: "Anahtarımı oluştur"
  cta_hint: "Giriş yap, ücretsiz anahtarı üret, API'yi çağır — bir dakikadan kısa."
  docs_pricing: "Fiyatlar"
  auth:
    title: "Kimlik doğrulama"
    body: "Her /v1 isteği anahtarını taşır — biçim: %prefix% ve ardından 40 onaltılık karakter — iki başlıktan birinde. Sunucuda yalnızca SHA-256 parmak izi saklanır: kaybolan anahtar yeniden oluşturulur, asla geri getirilmez."
    base_url: "Temel URL (v1, geliştirme): %url% — üretim erişimi sitenin alan adı üzerinden (TLS edge) sunulacak."
  endpoints:
    title: "Uç noktalar"
    healthz: "Servis durumu — kimlik doğrulaması gerektirmeyen tek rota."
    profiles: "Bir üyenin herkese açık profili: favoriler ve herkese açık build sayısı (profil gizliyse 404)."
    builds: "Bir şampiyonun herkese açık buildleri (Data Dragon id'si), en yeniden eskiye — page ve per_page ile sayfalanır (en çok 50)."
    trends: "Sitede en çok görüntülenen varlıklar: şampiyonlar, eşyalar, rünler veya sihirdar büyüleri — range=7d (varsayılan) veya 30d, ilk 25."
    usage: "Çağıran anahtarın canlı tüketimi — kimlik doğrulamalı ve hız limitli, ama asla kotadan düşülmez."
  quotas:
    title: "Kotalar ve hız limiti"
    quota: "Her istek önce planının aylık kotasına, sonra ön ödemeli kredilere yazılır; ikisi de tükenince API 429 quota_exceeded döner."
    rate: "Anahtar başına token bucket: her /v1 yanıtı X-RateLimit-Limit, X-RateLimit-Remaining ve X-RateLimit-Reset taşır; limitin üzerinde 429 rate_limited."
    month: "Kotalar takvim ayıyla sıfırlanır. Yıllık planlar hacimlerini aylık kota olarak taşır (ayda 20 000 veya 60 000 istek)."
  errors:
    title: "Hatalar"
    body: "Tüm hatalarda tek tip zarf. Kodlar: unauthorized (401), forbidden (403, iptal edilmiş anahtar), not_found (404), rate_limited ve quota_exceeded (429), invalid_request (400), internal (500/503)."
  manage:
    title: "Faturalama ve anahtar yönetimi"
    body: "Anahtarlar profilinden oluşturulur ve yönetilir; paketler ve abonelikler Stripe Checkout ile ödenir — API'nin kendisi asla ödeme verilerine dokunmaz."
