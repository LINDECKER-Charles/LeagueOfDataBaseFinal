developers:
  eyebrow: "Desarrolladores"
  title: "La API de LeagueOfDataBase"
  intro: "Una API REST JSON sobre los datos comunitarios del sitio: perfiles públicos de invocador, builds compartidas y tendencias de consulta. Gratis para probar, con precios para cargas reales."
  cta: "Crear mi clave"
  cta_hint: "Inicia sesión, genera la clave gratuita y llama a la API — en menos de un minuto."
  docs_pricing: "Precios"
  auth:
    title: "Autenticación"
    body: "Cada petición /v1 lleva tu clave — formato %prefix% seguido de 40 caracteres hexadecimales — en una de dos cabeceras. En el servidor solo se guarda su huella SHA-256: una clave perdida se regenera, nunca se recupera."
    base_url: "URL base (v1, desarrollo): %url% — el acceso en producción se expondrá a través del dominio del sitio (edge TLS)."
  endpoints:
    title: "Endpoints"
    healthz: "Estado del servicio — la única ruta sin autenticación."
    profiles: "Perfil público de un miembro: favoritos y número de builds públicas (404 si el perfil es privado)."
    builds: "Builds públicas de un campeón (id de Data Dragon), de la más reciente a la más antigua — paginado con page y per_page (máx. 50)."
    trends: "Entidades más consultadas del sitio: campeones, objetos, runas o hechizos de invocador — range=7d (por defecto) o 30d, top 25."
    usage: "Consumo en vivo de la clave llamante — autenticado y con límite de ritmo, pero nunca descontado de la cuota."
  quotas:
    title: "Cuotas y límite de ritmo"
    quota: "Cada petición se imputa a la cuota mensual de tu plan y después a los créditos prepagados; agotados ambos, la API responde 429 quota_exceeded."
    rate: "Token bucket por clave: cada respuesta /v1 lleva X-RateLimit-Limit, X-RateLimit-Remaining y X-RateLimit-Reset; por encima del límite, 429 rate_limited."
    month: "Las cuotas se reinician con el mes natural. Los planes anuales llevan su volumen como cuota mensual (20 000 o 60 000 peticiones al mes)."
  errors:
    title: "Errores"
    body: "Envoltura uniforme en todos los errores. Códigos: unauthorized (401), forbidden (403, clave revocada), not_found (404), rate_limited y quota_exceeded (429), invalid_request (400), internal (500/503)."
  manage:
    title: "Facturación y gestión de claves"
    body: "Las claves se crean y gestionan desde tu perfil; packs y suscripciones se pagan con Stripe Checkout — la API en sí nunca toca datos de pago."
