developers:
  eyebrow: "개발자"
  title: "LeagueOfDataBase API"
  intro: "사이트 커뮤니티 데이터를 다루는 REST JSON API: 공개 소환사 프로필, 공유 빌드, 조회 트렌드. 무료로 시작하고 실제 워크로드에는 유료 플랜을 제공합니다."
  cta: "키 만들기"
  cta_hint: "로그인 후 무료 키를 생성하고 API를 호출하기까지 1분이면 충분합니다."
  docs_pricing: "요금"
  auth:
    title: "인증"
    body: "모든 /v1 요청은 %prefix% 뒤에 16진수 40자가 이어지는 형식의 키를 두 헤더 중 하나로 전달합니다. 서버에는 SHA-256 지문만 저장됩니다: 잃어버린 키는 복구가 아니라 재발급 대상입니다."
    base_url: "기본 URL(v1, 개발): %url% — 프로덕션 접근은 사이트 도메인(TLS 에지)을 통해 제공될 예정입니다."
  endpoints:
    title: "엔드포인트"
    healthz: "서비스 상태 — 인증이 필요 없는 유일한 경로."
    profiles: "회원의 공개 프로필: 즐겨찾기와 공개 빌드 수(비공개 프로필은 404)."
    builds: "챔피언(Data Dragon id)의 공개 빌드, 최신순 — page와 per_page로 페이지네이션(최대 50)."
    trends: "사이트에서 가장 많이 조회된 항목: 챔피언, 아이템, 룬, 소환사 주문 — range=7d(기본) 또는 30d, 상위 25."
    usage: "호출 키의 실시간 사용량 — 인증과 속도 제한은 적용되지만 할당량에서는 차감되지 않습니다."
  quotas:
    title: "할당량과 속도 제한"
    quota: "각 요청은 먼저 플랜의 월 할당량에, 그다음 선불 크레딧에 청구됩니다. 둘 다 소진되면 API는 429 quota_exceeded를 반환합니다."
    rate: "키별 토큰 버킷: 모든 /v1 응답에 X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset이 포함됩니다. 초과 시 429 rate_limited."
    month: "할당량은 달력 기준 월로 초기화됩니다. 연간 플랜은 물량을 월 할당량으로 적용합니다(월 20,000 또는 60,000회)."
  errors:
    title: "오류"
    body: "모든 오류에 동일한 형식의 응답. 코드: unauthorized(401), forbidden(403, 폐기된 키), not_found(404), rate_limited·quota_exceeded(429), invalid_request(400), internal(500/503)."
  manage:
    title: "결제 및 키 관리"
    body: "키는 프로필에서 생성·관리합니다. 팩과 구독은 Stripe Checkout으로 결제하며 API 자체는 결제 데이터를 다루지 않습니다."
