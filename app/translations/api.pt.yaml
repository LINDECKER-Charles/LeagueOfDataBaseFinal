developers:
  eyebrow: "Desenvolvedores"
  title: "A API do LeagueOfDataBase"
  intro: "Uma API REST JSON sobre os dados comunitários do site: perfis públicos de invocador, builds compartilhadas e tendências de consulta. Grátis para testar, com preços para cargas reais."
  cta: "Criar minha chave"
  cta_hint: "Entre, gere a chave gratuita e chame a API — em menos de um minuto."
  docs_pricing: "Preços"
  auth:
    title: "Autenticação"
    body: "Cada requisição /v1 leva sua chave — formato %prefix% seguido de 40 caracteres hexadecimais — em um de dois cabeçalhos. No servidor só é guardada sua impressão SHA-256: uma chave perdida se regenera, nunca se recupera."
    base_url: "URL base (v1, desenvolvimento): %url% — o acesso em produção será exposto pelo domínio do site (edge TLS)."
  endpoints:
    title: "Endpoints"
    healthz: "Estado do serviço — a única rota sem autenticação."
    profiles: "Perfil público de um membro: favoritos e número de builds públicas (404 se o perfil for privado)."
    builds: "Builds públicas de um campeão (id do Data Dragon), da mais recente — paginado com page e per_page (máx. 50)."
    trends: "Entidades mais consultadas do site: campeões, itens, runas ou feitiços de invocador — range=7d (padrão) ou 30d, top 25."
    usage: "Consumo ao vivo da chave chamadora — autenticado e com limite de taxa, mas nunca descontado da cota."
  quotas:
    title: "Cotas e limite de taxa"
    quota: "Cada requisição é debitada da cota mensal do seu plano e depois dos créditos pré-pagos; esgotados os dois, a API responde 429 quota_exceeded."
    rate: "Token bucket por chave: cada resposta /v1 traz X-RateLimit-Limit, X-RateLimit-Remaining e X-RateLimit-Reset; acima do limite, 429 rate_limited."
    month: "As cotas reiniciam com o mês do calendário. Os planos anuais carregam seu volume como cota mensal (20 000 ou 60 000 requisições por mês)."
  errors:
    title: "Erros"
    body: "Envelope uniforme em todos os erros. Códigos: unauthorized (401), forbidden (403, chave revogada), not_found (404), rate_limited e quota_exceeded (429), invalid_request (400), internal (500/503)."
  manage:
    title: "Cobrança e gestão de chaves"
    body: "As chaves são criadas e geridas no seu perfil; pacotes e assinaturas são pagos via Stripe Checkout — a própria API nunca toca em dados de pagamento."
