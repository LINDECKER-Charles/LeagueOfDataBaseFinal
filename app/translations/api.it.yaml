developers:
  eyebrow: "Sviluppatori"
  title: "L'API di LeagueOfDataBase"
  intro: "Un'API REST JSON sui dati comunitari del sito: profili pubblici degli evocatori, build condivise e tendenze di consultazione. Gratuita da provare, con prezzi per carichi reali."
  cta: "Crea la mia chiave"
  cta_hint: "Accedi, genera la chiave gratuita, chiama l'API — meno di un minuto."
  docs_pricing: "Prezzi"
  auth:
    title: "Autenticazione"
    body: "Ogni richiesta /v1 porta la tua chiave — formato %prefix% seguito da 40 caratteri esadecimali — in una delle due intestazioni. Sul server si conserva solo l'impronta SHA-256: una chiave persa si rigenera, non si recupera."
    base_url: "URL di base (v1, sviluppo): %url% — l'accesso in produzione sarà esposto tramite il dominio del sito (edge TLS)."
  endpoints:
    title: "Endpoint"
    healthz: "Stato del servizio — l'unica rotta senza autenticazione."
    profiles: "Profilo pubblico di un membro: preferiti e numero di build pubbliche (404 se il profilo è privato)."
    builds: "Build pubbliche di un campione (id Data Dragon), dalla più recente — paginato con page e per_page (max 50)."
    trends: "Entità più consultate del sito: campioni, oggetti, rune o incantesimi dell'evocatore — range=7d (predefinito) o 30d, top 25."
    usage: "Consumo in tempo reale della chiave chiamante — autenticato e con limite di frequenza, ma mai contato nella quota."
  quotas:
    title: "Quote e limite di frequenza"
    quota: "Ogni richiesta è imputata alla quota mensile del tuo piano, poi ai crediti prepagati; esauriti entrambi, l'API risponde 429 quota_exceeded."
    rate: "Token bucket per chiave: ogni risposta /v1 porta X-RateLimit-Limit, X-RateLimit-Remaining e X-RateLimit-Reset; oltre il limite, 429 rate_limited."
    month: "Le quote si azzerano con il mese di calendario. I piani annuali portano il loro volume come quota mensile (20 000 o 60 000 richieste al mese)."
  errors:
    title: "Errori"
    body: "Busta uniforme su tutti gli errori. Codici: unauthorized (401), forbidden (403, chiave revocata), not_found (404), rate_limited e quota_exceeded (429), invalid_request (400), internal (500/503)."
  manage:
    title: "Fatturazione e gestione delle chiavi"
    body: "Le chiavi si creano e si gestiscono dal tuo profilo; pacchetti e abbonamenti si pagano con Stripe Checkout — l'API in sé non tocca mai dati di pagamento."
