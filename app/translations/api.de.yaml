developers:
  eyebrow: "Entwickler"
  title: "Die LeagueOfDataBase-API"
  intro: "Eine REST-JSON-API über die Community-Daten der Seite: öffentliche Beschwörerprofile, geteilte Builds und Konsultations-Trends. Gratis zum Ausprobieren, tarifiert für echte Lasten."
  cta: "Schlüssel erstellen"
  cta_hint: "Anmelden, Gratis-Schlüssel erzeugen, API aufrufen — unter einer Minute."
  docs_pricing: "Preise"
  auth:
    title: "Authentifizierung"
    body: "Jede /v1-Anfrage trägt deinen Schlüssel — Format %prefix% gefolgt von 40 Hexadezimalzeichen — in einem von zwei Headern. Serverseitig wird nur der SHA-256-Fingerabdruck gespeichert: ein verlorener Schlüssel wird neu erzeugt, nie wiederhergestellt."
    base_url: "Basis-URL (v1, Entwicklung): %url% — der Produktionszugang wird über die Domain der Seite (TLS-Edge) bereitgestellt."
  endpoints:
    title: "Endpunkte"
    healthz: "Dienststatus — die einzige Route ohne Authentifizierung."
    profiles: "Öffentliches Profil eines Mitglieds: Favoriten und Anzahl öffentlicher Builds (404 bei privatem Profil)."
    builds: "Öffentliche Builds eines Champions (Data-Dragon-Id), neueste zuerst — paginiert über page und per_page (max. 50)."
    trends: "Meistbesuchte Entitäten der Seite: Champions, Items, Runen oder Beschwörerzauber — range=7d (Standard) oder 30d, Top 25."
    usage: "Live-Verbrauch des aufrufenden Schlüssels — authentifiziert und ratenlimitiert, aber nie vom Kontingent abgezogen."
  quotas:
    title: "Kontingente & Ratenlimit"
    quota: "Jede Anfrage wird zuerst dem Monatskontingent deines Tarifs, dann den vorausbezahlten Credits belastet; sind beide erschöpft, antwortet die API mit 429 quota_exceeded."
    rate: "Token-Bucket pro Schlüssel: jede /v1-Antwort trägt X-RateLimit-Limit, X-RateLimit-Remaining und X-RateLimit-Reset; darüber hinaus 429 rate_limited."
    month: "Kontingente setzen sich mit dem Kalendermonat zurück. Jahres-Tarife führen ihr Volumen als Monatskontingent (20 000 bzw. 60 000 Anfragen pro Monat)."
  errors:
    title: "Fehler"
    body: "Einheitliche Hülle für alle Fehler. Codes: unauthorized (401), forbidden (403, widerrufener Schlüssel), not_found (404), rate_limited und quota_exceeded (429), invalid_request (400), internal (500/503)."
  manage:
    title: "Abrechnung & Schlüsselverwaltung"
    body: "Schlüssel werden im Profil erstellt und verwaltet; Pakete und Abonnements laufen über Stripe Checkout — die API selbst berührt niemals Zahlungsdaten."
