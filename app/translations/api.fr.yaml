developers:
  eyebrow: "Développeurs"
  title: "L'API LeagueOfDataBase"
  intro: "Une API REST JSON sur les données communautaires du site : profils publics d'invocateurs, builds partagés et tendances de consultation. Gratuite pour essayer, tarifée pour les vrais usages."
  cta: "Créer ma clé"
  cta_hint: "Connectez-vous, générez la clé gratuite, appelez l'API — moins d'une minute."
  docs_pricing: "Tarifs"
  auth:
    title: "Authentification"
    body: "Chaque requête /v1 porte votre clé — format %prefix% suivi de 40 caractères hexadécimaux — dans l'un des deux en-têtes. Seule son empreinte SHA-256 est stockée côté serveur : une clé perdue se régénère, elle ne se récupère pas."
    base_url: "URL de base (v1, développement) : %url% — l'accès en production sera exposé via le domaine du site (edge TLS)."
  endpoints:
    title: "Endpoints"
    healthz: "État du service — la seule route sans authentification."
    profiles: "Profil public d'un membre : favoris et nombre de builds publics (404 si le profil est privé)."
    builds: "Builds publics d'un champion (id Data Dragon), du plus récent au plus ancien — paginé via page et per_page (max 50)."
    trends: "Entités les plus consultées du site : champions, objets, runes ou sorts d'invocateur — range=7d (défaut) ou 30d, top 25."
    usage: "Consommation en direct de la clé appelante — authentifiée et soumise au débit, mais jamais décomptée du quota."
  quotas:
    title: "Quotas & limitation de débit"
    quota: "Chaque requête est imputée au quota mensuel de votre offre, puis aux crédits prépayés ; les deux épuisés, l'API répond 429 quota_exceeded."
    rate: "Token bucket par clé : chaque réponse /v1 porte X-RateLimit-Limit, X-RateLimit-Remaining et X-RateLimit-Reset ; au-delà, 429 rate_limited."
    month: "Les quotas se réinitialisent au mois calendaire. Les offres annuelles portent leur volume en quota mensuel (20 000 ou 60 000 requêtes par mois)."
  errors:
    title: "Erreurs"
    body: "Enveloppe uniforme sur toutes les erreurs. Codes : unauthorized (401), forbidden (403, clé révoquée), not_found (404), rate_limited et quota_exceeded (429), invalid_request (400), internal (500/503)."
  manage:
    title: "Facturation & gestion des clés"
    body: "Les clés se créent et se gèrent depuis votre profil ; packs et abonnements se règlent via Stripe Checkout — l'API elle-même ne manipule jamais de données de paiement."
