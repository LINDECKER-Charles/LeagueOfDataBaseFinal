developers:
  eyebrow: "Разработчикам"
  title: "API LeagueOfDataBase"
  intro: "REST JSON API над данными сообщества сайта: публичные профили призывателей, общие сборки и тренды просмотров. Бесплатно для пробы, с тарифами под реальные нагрузки."
  cta: "Создать ключ"
  cta_hint: "Войдите, создайте бесплатный ключ, вызовите API — меньше минуты."
  docs_pricing: "Цены"
  auth:
    title: "Аутентификация"
    body: "Каждый запрос /v1 несёт ваш ключ — формат %prefix% и 40 шестнадцатеричных символов — в одном из двух заголовков. На сервере хранится только отпечаток SHA-256: потерянный ключ перевыпускается, а не восстанавливается."
    base_url: "Базовый URL (v1, разработка): %url% — продакшен-доступ будет открыт через домен сайта (TLS edge)."
  endpoints:
    title: "Эндпоинты"
    healthz: "Состояние сервиса — единственный маршрут без аутентификации."
    profiles: "Публичный профиль участника: избранное и число публичных сборок (404, если профиль приватный)."
    builds: "Публичные сборки чемпиона (id Data Dragon), от новых к старым — пагинация через page и per_page (макс. 50)."
    trends: "Самые просматриваемые сущности сайта: чемпионы, предметы, руны или заклинания призывателя — range=7d (по умолчанию) или 30d, топ-25."
    usage: "Текущий расход вызывающего ключа — с аутентификацией и лимитом частоты, но никогда не списывается с квоты."
  quotas:
    title: "Квоты и ограничение частоты"
    quota: "Каждый запрос списывается сначала с месячной квоты плана, затем с предоплаченных кредитов; когда исчерпано и то и другое, API отвечает 429 quota_exceeded."
    rate: "Token bucket на ключ: каждый ответ /v1 несёт X-RateLimit-Limit, X-RateLimit-Remaining и X-RateLimit-Reset; сверх лимита — 429 rate_limited."
    month: "Квоты обнуляются с календарным месяцем. Годовые планы несут объём как месячную квоту (20 000 или 60 000 запросов в месяц)."
  errors:
    title: "Ошибки"
    body: "Единый конверт для всех ошибок. Коды: unauthorized (401), forbidden (403, отозванный ключ), not_found (404), rate_limited и quota_exceeded (429), invalid_request (400), internal (500/503)."
  manage:
    title: "Оплата и управление ключами"
    body: "Ключи создаются и управляются из профиля; пакеты и подписки оплачиваются через Stripe Checkout — само API никогда не касается платёжных данных."
