developers:
  eyebrow: "Vývojáři"
  title: "API LeagueOfDataBase"
  intro: "REST JSON API nad komunitními daty webu: veřejné profily vyvolávačů, sdílené buildy a trendy návštěvnosti. Zdarma na vyzkoušení, s ceníkem pro reálné zatížení."
  cta: "Vytvořit klíč"
  cta_hint: "Přihlaste se, vygenerujte bezplatný klíč, zavolejte API — do minuty."
  docs_pricing: "Ceník"
  auth:
    title: "Autentizace"
    body: "Každý požadavek /v1 nese váš klíč — formát %prefix% následovaný 40 šestnáctkovými znaky — v jedné ze dvou hlaviček. Na serveru se ukládá jen otisk SHA-256: ztracený klíč se generuje znovu, nikdy neobnovuje."
    base_url: "Základní URL (v1, vývoj): %url% — produkční přístup bude vystaven přes doménu webu (TLS edge)."
  endpoints:
    title: "Endpointy"
    healthz: "Stav služby — jediná trasa bez autentizace."
    profiles: "Veřejný profil člena: oblíbené a počet veřejných buildů (404 u soukromého profilu)."
    builds: "Veřejné buildy šampiona (id Data Dragon), od nejnovějších — stránkované přes page a per_page (max. 50)."
    trends: "Nejprohlíženější entity webu: šampioni, předměty, runy nebo kouzla vyvolávače — range=7d (výchozí) nebo 30d, top 25."
    usage: "Živá spotřeba volajícího klíče — autentizovaná a limitovaná, ale nikdy se nepočítá do kvóty."
  quotas:
    title: "Kvóty a limit frekvence"
    quota: "Každý požadavek se účtuje nejprve měsíční kvótě plánu, poté předplaceným kreditům; po vyčerpání obojího API odpoví 429 quota_exceeded."
    rate: "Token bucket na klíč: každá odpověď /v1 nese X-RateLimit-Limit, X-RateLimit-Remaining a X-RateLimit-Reset; nad limit 429 rate_limited."
    month: "Kvóty se nulují s kalendářním měsícem. Roční plány nesou objem jako měsíční kvótu (20 000 nebo 60 000 požadavků měsíčně)."
  errors:
    title: "Chyby"
    body: "Jednotná obálka u všech chyb. Kódy: unauthorized (401), forbidden (403, zneplatněný klíč), not_found (404), rate_limited a quota_exceeded (429), invalid_request (400), internal (500/503)."
  manage:
    title: "Fakturace a správa klíčů"
    body: "Klíče se vytvářejí a spravují z profilu; balíčky a předplatná se platí přes Stripe Checkout — samotné API se platebních dat nikdy nedotkne."
