developers:
  eyebrow: "นักพัฒนา"
  title: "API ของ LeagueOfDataBase"
  intro: "REST JSON API บนข้อมูลชุมชนของเว็บไซต์: โปรไฟล์ผู้เรียกสาธารณะ บิลด์ที่แชร์ และเทรนด์การเข้าชม ทดลองใช้ฟรี มีราคาสำหรับงานจริง"
  cta: "สร้างคีย์ของฉัน"
  cta_hint: "เข้าสู่ระบบ สร้างคีย์ฟรี เรียกใช้ API — ไม่ถึงหนึ่งนาที"
  docs_pricing: "ราคา"
  auth:
    title: "การยืนยันตัวตน"
    body: "ทุกคำขอ /v1 ต้องมีคีย์ของคุณ — รูปแบบ %prefix% ตามด้วยอักขระฐานสิบหก 40 ตัว — ในหนึ่งจากสองเฮดเดอร์ ฝั่งเซิร์ฟเวอร์เก็บเพียงลายนิ้วมือ SHA-256: คีย์ที่หายจะถูกสร้างใหม่ ไม่มีทางกู้คืน"
    base_url: "URL หลัก (v1, สภาพแวดล้อมพัฒนา): %url% — การเข้าถึงจริงจะเปิดผ่านโดเมนของเว็บไซต์ (TLS edge)"
  endpoints:
    title: "เอนด์พอยต์"
    healthz: "สถานะบริการ — เส้นทางเดียวที่ไม่ต้องยืนยันตัวตน"
    profiles: "โปรไฟล์สาธารณะของสมาชิก: รายการโปรดและจำนวนบิลด์สาธารณะ (404 ถ้าโปรไฟล์เป็นส่วนตัว)"
    builds: "บิลด์สาธารณะของแชมเปียน (id ของ Data Dragon) เรียงจากใหม่สุด — แบ่งหน้าโดย page และ per_page (สูงสุด 50)"
    trends: "รายการที่ถูกเข้าชมมากที่สุดของเว็บไซต์: แชมเปียน ไอเทม รูน หรือเวทผู้เรียก — range=7d (ค่าเริ่มต้น) หรือ 30d, 25 อันดับแรก"
    usage: "การใช้งานสดของคีย์ผู้เรียก — ต้องยืนยันตัวตนและถูกจำกัดอัตรา แต่ไม่ถูกนับเข้าโควตาเลย"
  quotas:
    title: "โควตาและการจำกัดอัตรา"
    quota: "แต่ละคำขอถูกหักจากโควตารายเดือนของแพ็กเกจก่อน แล้วจึงหักจากเครดิตเติมเงิน; เมื่อหมดทั้งคู่ API จะตอบ 429 quota_exceeded"
    rate: "Token bucket ต่อคีย์: ทุกการตอบกลับ /v1 มี X-RateLimit-Limit, X-RateLimit-Remaining และ X-RateLimit-Reset; เกินขีดจำกัดจะได้ 429 rate_limited"
    month: "โควตารีเซ็ตตามเดือนปฏิทิน แพ็กเกจรายปีถือปริมาณเป็นโควตารายเดือน (20,000 หรือ 60,000 คำขอต่อเดือน)"
  errors:
    title: "ข้อผิดพลาด"
    body: "รูปแบบซองเดียวกันทุกข้อผิดพลาด รหัส: unauthorized (401), forbidden (403 คีย์ถูกเพิกถอน), not_found (404), rate_limited และ quota_exceeded (429), invalid_request (400), internal (500/503)"
  manage:
    title: "การเรียกเก็บเงินและการจัดการคีย์"
    body: "สร้างและจัดการคีย์ได้จากโปรไฟล์ของคุณ แพ็กและการสมัครชำระผ่าน Stripe Checkout — ตัว API เองไม่แตะข้อมูลการชำระเงินเลย"
