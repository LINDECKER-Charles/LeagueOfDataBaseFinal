developers:
  eyebrow: "Dezvoltatori"
  title: "API-ul LeagueOfDataBase"
  intro: "Un API REST JSON peste datele comunitare ale site-ului: profiluri publice de invocatori, builduri partajate și tendințe de vizualizare. Gratuit de încercat, tarifat pentru sarcini reale."
  cta: "Creează-mi cheia"
  cta_hint: "Autentifică-te, generează cheia gratuită, apelează API-ul — în mai puțin de un minut."
  docs_pricing: "Prețuri"
  auth:
    title: "Autentificare"
    body: "Fiecare cerere /v1 poartă cheia ta — format %prefix% urmat de 40 de caractere hexazecimale — într-unul din două anteturi. Pe server se păstrează doar amprenta SHA-256: o cheie pierdută se regenerează, nu se recuperează."
    base_url: "URL de bază (v1, dezvoltare): %url% — accesul de producție va fi expus prin domeniul site-ului (edge TLS)."
  endpoints:
    title: "Endpointuri"
    healthz: "Starea serviciului — singura rută fără autentificare."
    profiles: "Profilul public al unui membru: favorite și numărul de builduri publice (404 dacă profilul e privat)."
    builds: "Buildurile publice ale unui campion (id Data Dragon), de la cel mai recent — paginat cu page și per_page (max. 50)."
    trends: "Cele mai vizualizate entități ale site-ului: campioni, obiecte, rune sau vrăji de invocator — range=7d (implicit) sau 30d, top 25."
    usage: "Consumul în timp real al cheii apelante — autentificat și limitat în ritm, dar niciodată scăzut din cotă."
  quotas:
    title: "Cote și limitare de ritm"
    quota: "Fiecare cerere se impută întâi cotei lunare a planului, apoi creditelor preplătite; epuizate amândouă, API-ul răspunde 429 quota_exceeded."
    rate: "Token bucket per cheie: fiecare răspuns /v1 poartă X-RateLimit-Limit, X-RateLimit-Remaining și X-RateLimit-Reset; peste limită, 429 rate_limited."
    month: "Cotele se resetează cu luna calendaristică. Planurile anuale poartă volumul drept cotă lunară (20 000 sau 60 000 de cereri pe lună)."
  errors:
    title: "Erori"
    body: "Plic uniform la toate erorile. Coduri: unauthorized (401), forbidden (403, cheie revocată), not_found (404), rate_limited și quota_exceeded (429), invalid_request (400), internal (500/503)."
  manage:
    title: "Facturare și gestiunea cheilor"
    body: "Cheile se creează și se gestionează din profilul tău; pachetele și abonamentele se plătesc prin Stripe Checkout — API-ul în sine nu atinge niciodată date de plată."
