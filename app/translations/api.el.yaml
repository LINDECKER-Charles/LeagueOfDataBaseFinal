developers:
  eyebrow: "Προγραμματιστές"
  title: "Το API του LeagueOfDataBase"
  intro: "Ένα REST JSON API πάνω στα κοινοτικά δεδομένα του ιστότοπου: δημόσια προφίλ επικαλεστών, κοινόχρηστα builds και τάσεις προβολών. Δωρεάν για δοκιμή, με τιμολόγηση για πραγματικά φορτία."
  cta: "Δημιουργία κλειδιού"
  cta_hint: "Συνδεθείτε, δημιουργήστε το δωρεάν κλειδί, καλέστε το API — σε λιγότερο από ένα λεπτό."
  docs_pricing: "Τιμές"
  auth:
    title: "Πιστοποίηση"
    body: "Κάθε αίτημα /v1 φέρει το κλειδί σας — μορφή %prefix% ακολουθούμενη από 40 δεκαεξαδικούς χαρακτήρες — σε μία από δύο κεφαλίδες. Στον διακομιστή αποθηκεύεται μόνο το αποτύπωμα SHA-256: ένα χαμένο κλειδί αναδημιουργείται, δεν ανακτάται ποτέ."
    base_url: "Βασικό URL (v1, ανάπτυξη): %url% — η παραγωγική πρόσβαση θα εκτεθεί μέσω του domain του ιστότοπου (TLS edge)."
  endpoints:
    title: "Endpoints"
    healthz: "Κατάσταση υπηρεσίας — η μόνη διαδρομή χωρίς πιστοποίηση."
    profiles: "Δημόσιο προφίλ μέλους: αγαπημένα και αριθμός δημόσιων builds (404 αν το προφίλ είναι ιδιωτικό)."
    builds: "Δημόσια builds ενός ήρωα (id Data Dragon), από το νεότερο — σελιδοποίηση με page και per_page (έως 50)."
    trends: "Οι πιο δημοφιλείς οντότητες του ιστότοπου: ήρωες, αντικείμενα, ρούνοι ή ξόρκια επικαλεστή — range=7d (προεπιλογή) ή 30d, κορυφαία 25."
    usage: "Ζωντανή κατανάλωση του καλούντος κλειδιού — με πιστοποίηση και όριο ρυθμού, αλλά δεν μετρά ποτέ στο όριο χρήσης."
  quotas:
    title: "Όρια & ρυθμός"
    quota: "Κάθε αίτημα χρεώνεται πρώτα στο μηνιαίο όριο του πλάνου σας και μετά στις προπληρωμένες μονάδες· όταν εξαντληθούν και τα δύο, το API απαντά 429 quota_exceeded."
    rate: "Token bucket ανά κλειδί: κάθε απόκριση /v1 φέρει X-RateLimit-Limit, X-RateLimit-Remaining και X-RateLimit-Reset· πάνω από το όριο, 429 rate_limited."
    month: "Τα όρια μηδενίζονται με τον ημερολογιακό μήνα. Τα ετήσια πλάνα φέρουν τον όγκο τους ως μηνιαίο όριο (20 000 ή 60 000 αιτήματα τον μήνα)."
  errors:
    title: "Σφάλματα"
    body: "Ενιαίος φάκελος σε όλα τα σφάλματα. Κωδικοί: unauthorized (401), forbidden (403, ανακλημένο κλειδί), not_found (404), rate_limited και quota_exceeded (429), invalid_request (400), internal (500/503)."
  manage:
    title: "Χρεώσεις & διαχείριση κλειδιών"
    body: "Τα κλειδιά δημιουργούνται και διαχειρίζονται από το προφίλ σας· πακέτα και συνδρομές πληρώνονται μέσω Stripe Checkout — το ίδιο το API δεν αγγίζει ποτέ δεδομένα πληρωμών."
