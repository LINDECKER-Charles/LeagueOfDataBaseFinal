developers:
  eyebrow: "開發者"
  title: "LeagueOfDataBase API"
  intro: "一個建立在網站社群資料上的 REST JSON API:公開召喚師檔案、共享出裝與瀏覽趨勢。免費試用,為真實負載提供付費方案。"
  cta: "建立我的金鑰"
  cta_hint: "登入、產生免費金鑰、呼叫 API — 不到一分鐘。"
  docs_pricing: "價格"
  auth:
    title: "身分驗證"
    body: "每個 /v1 請求都需在兩種標頭之一攜帶你的金鑰 — 格式為 %prefix% 加上 40 個十六進位字元。伺服器端只保存其 SHA-256 指紋:遺失的金鑰只能重新產生,無法找回。"
    base_url: "基礎 URL(v1,開發環境): %url% — 正式環境將透過網站網域(TLS 邊緣)開放。"
  endpoints:
    title: "端點"
    healthz: "服務健康狀態 — 唯一不需驗證的路由。"
    profiles: "成員的公開檔案:最愛與公開出裝數量(檔案未公開時回傳 404)。"
    builds: "某英雄(Data Dragon id)的公開出裝,由新到舊 — 以 page 與 per_page 分頁(最多 50)。"
    trends: "網站瀏覽量最高的項目:英雄、裝備、符文或召喚師技能 — range=7d(預設)或 30d,前 25 名。"
    usage: "呼叫金鑰的即時用量 — 需要驗證並受速率限制,但絕不計入配額。"
  quotas:
    title: "配額與速率限制"
    quota: "每次請求先記入方案的月配額,再記入預付點數;兩者用盡後,API 回傳 429 quota_exceeded。"
    rate: "以金鑰為單位的令牌桶:每個 /v1 回應都帶有 X-RateLimit-Limit、X-RateLimit-Remaining 與 X-RateLimit-Reset;超過限制回傳 429 rate_limited。"
    month: "配額隨日曆月重置。年繳方案以月配額承載額度(每月 20,000 或 60,000 次)。"
  errors:
    title: "錯誤"
    body: "所有錯誤統一封裝。代碼:unauthorized(401)、forbidden(403,金鑰已撤銷)、not_found(404)、rate_limited 與 quota_exceeded(429)、invalid_request(400)、internal(500/503)。"
  manage:
    title: "計費與金鑰管理"
    body: "金鑰於個人檔案中建立與管理;點數包與訂閱透過 Stripe Checkout 付款 — API 本身絕不接觸付款資料。"
