developers:
  eyebrow: "المطوّرون"
  title: "واجهة LeagueOfDataBase API"
  intro: "واجهة REST JSON فوق بيانات مجتمع الموقع: ملفات المستدعين العامة، البناءات المشتركة واتجاهات التصفح. مجانية للتجربة، ومسعّرة للأحمال الحقيقية."
  cta: "إنشاء مفتاحي"
  cta_hint: "سجّل الدخول، ولّد المفتاح المجاني، واستدعِ الواجهة — في أقل من دقيقة."
  docs_pricing: "الأسعار"
  auth:
    title: "المصادقة"
    body: "كل طلب /v1 يحمل مفتاحك — بصيغة %prefix% متبوعة بـ40 حرفًا سداسيًّا عشريًّا — في أحد ترويستين. لا يُخزَّن على الخادم سوى بصمته SHA-256: المفتاح المفقود يعاد توليده ولا يُسترجع أبدًا."
    base_url: "عنوان الأساس (v1، بيئة التطوير): %url% — سيُتاح الوصول الإنتاجي عبر نطاق الموقع (حافة TLS)."
  endpoints:
    title: "نقاط النهاية"
    healthz: "حالة الخدمة — المسار الوحيد دون مصادقة."
    profiles: "الملف العام لعضو: المفضّلات وعدد البناءات العامة (404 إذا كان الملف خاصًّا)."
    builds: "البناءات العامة لبطل (معرّف Data Dragon)، من الأحدث إلى الأقدم — مقسّمة عبر page و per_page (بحد أقصى 50)."
    trends: "أكثر عناصر الموقع تصفحًا: الأبطال أو العناصر أو الرونات أو تعاويذ المستدعي — range=7d (افتراضي) أو 30d، أفضل 25."
    usage: "الاستهلاك الحيّ للمفتاح المستدعي — مع مصادقة وحدّ معدّل، لكنه لا يُحتسب أبدًا من الحصّة."
  quotas:
    title: "الحصص وحدّ المعدّل"
    quota: "يُحتسب كل طلب أولًا من الحصّة الشهرية لخطتك ثم من الأرصدة مسبقة الدفع؛ وعند نفاد الاثنين تردّ الواجهة بـ 429 quota_exceeded."
    rate: "دلو رموز لكل مفتاح: كل استجابة /v1 تحمل X-RateLimit-Limit و X-RateLimit-Remaining و X-RateLimit-Reset؛ وفوق الحدّ 429 rate_limited."
    month: "تُعاد الحصص إلى الصفر مع الشهر الميلادي. الخطط السنوية تحمل حجمها كحصّة شهرية (20000 أو 60000 طلب شهريًا)."
  errors:
    title: "الأخطاء"
    body: "غلاف موحّد لكل الأخطاء. الرموز: unauthorized (401)، forbidden (403، مفتاح ملغى)، not_found (404)، rate_limited و quota_exceeded (429)، invalid_request (400)، internal (500/503)."
  manage:
    title: "الفوترة وإدارة المفاتيح"
    body: "تُنشأ المفاتيح وتُدار من ملفك الشخصي؛ وتُدفع الحزم والاشتراكات عبر Stripe Checkout — الواجهة نفسها لا تلمس بيانات الدفع أبدًا."
