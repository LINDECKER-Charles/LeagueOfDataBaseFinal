developers:
  eyebrow: "Deweloperzy"
  title: "API LeagueOfDataBase"
  intro: "API REST JSON nad danymi społeczności serwisu: publiczne profile przywoływaczy, udostępnione buildy i trendy odwiedzin. Darmowe na start, wyceniane pod realne obciążenia."
  cta: "Utwórz mój klucz"
  cta_hint: "Zaloguj się, wygeneruj darmowy klucz, wywołaj API — w niecałą minutę."
  docs_pricing: "Cennik"
  auth:
    title: "Uwierzytelnianie"
    body: "Każde zapytanie /v1 niesie twój klucz — format %prefix% i 40 znaków szesnastkowych — w jednym z dwóch nagłówków. Po stronie serwera trzymany jest tylko odcisk SHA-256: zgubiony klucz generuje się ponownie, nie odzyskuje."
    base_url: "Bazowy URL (v1, środowisko deweloperskie): %url% — dostęp produkcyjny będzie wystawiony przez domenę serwisu (edge TLS)."
  endpoints:
    title: "Endpointy"
    healthz: "Stan usługi — jedyna trasa bez uwierzytelniania."
    profiles: "Publiczny profil członka: ulubione i liczba publicznych buildów (404, gdy profil jest prywatny)."
    builds: "Publiczne buildy bohatera (id Data Dragon), od najnowszych — stronicowane przez page i per_page (maks. 50)."
    trends: "Najczęściej oglądane byty serwisu: bohaterowie, przedmioty, runy lub czary przywoływacza — range=7d (domyślnie) lub 30d, top 25."
    usage: "Bieżące zużycie wywołującego klucza — uwierzytelnione i limitowane, ale nigdy nie liczone do limitu."
  quotas:
    title: "Limity i tempo zapytań"
    quota: "Każde zapytanie obciąża najpierw miesięczny limit planu, potem przedpłacone kredyty; po wyczerpaniu obu API odpowiada 429 quota_exceeded."
    rate: "Token bucket na klucz: każda odpowiedź /v1 niesie X-RateLimit-Limit, X-RateLimit-Remaining i X-RateLimit-Reset; powyżej limitu 429 rate_limited."
    month: "Limity zerują się z miesiącem kalendarzowym. Plany roczne niosą swój wolumen jako limit miesięczny (20 000 lub 60 000 zapytań miesięcznie)."
  errors:
    title: "Błędy"
    body: "Jednolita koperta dla wszystkich błędów. Kody: unauthorized (401), forbidden (403, klucz unieważniony), not_found (404), rate_limited i quota_exceeded (429), invalid_request (400), internal (500/503)."
  manage:
    title: "Rozliczenia i zarządzanie kluczami"
    body: "Klucze tworzy się i zarządza nimi z profilu; pakiety i subskrypcje opłacane są przez Stripe Checkout — samo API nigdy nie dotyka danych płatniczych."
