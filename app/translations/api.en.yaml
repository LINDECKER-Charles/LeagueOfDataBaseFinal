developers:
  eyebrow: "Developers"
  title: "The LeagueOfDataBase API"
  intro: "A REST JSON API over the site's community data: public summoner profiles, shared builds and consultation trends. Free to try, priced for real workloads."
  cta: "Create my key"
  cta_hint: "Sign in, generate the free key, call the API — under a minute."
  docs_pricing: "Pricing"
  auth:
    title: "Authentication"
    body: "Every /v1 request carries your key — format %prefix% followed by 40 hexadecimal characters — in one of two headers. Only its SHA-256 fingerprint is stored server-side: a lost key is regenerated, never recovered."
    base_url: "Base URL (v1, development): %url% — production access will be exposed through the site's own domain via the TLS edge."
  endpoints:
    title: "Endpoints"
    healthz: "Service health — the only route without authentication."
    profiles: "Public profile of a member: favorites and number of public builds (404 if the profile is private)."
    builds: "Public builds for a champion (Data Dragon id), newest first — paginated with page and per_page (max 50)."
    trends: "Most-viewed entities on the site: champions, items, runes or summoners — range=7d (default) or 30d, top 25."
    usage: "Live consumption of the calling key — authenticated and rate-limited, but never counted against the quota."
  quotas:
    title: "Quotas & rate limiting"
    quota: "Each request is charged to the monthly quota of your plan, then to prepaid credits; when both are exhausted the API answers 429 quota_exceeded."
    rate: "Token bucket per key: every /v1 response carries X-RateLimit-Limit, X-RateLimit-Remaining and X-RateLimit-Reset; beyond the limit, 429 rate_limited."
    month: "Quotas reset with the calendar month. Annual plans carry their volume as a monthly quota (20 000 or 60 000 requests per month)."
  errors:
    title: "Errors"
    body: "Uniform envelope on every error. Codes: unauthorized (401), forbidden (403, revoked key), not_found (404), rate_limited and quota_exceeded (429), invalid_request (400), internal (500/503)."
  manage:
    title: "Billing & key management"
    body: "Keys are created and managed from your profile; credit packs and subscriptions are paid through Stripe Checkout — the API itself never touches payment data."
