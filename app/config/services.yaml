# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # Application release version — single source of truth. Surfaced in the navbar
    # (Twig global `app_version`) and used as the "current" marker of the changelog
    # history. Bump on release; keep in sync with the newest public/changelog entry.
    app.version: '2.0.0'

    # Docker-internal health endpoints probed by the admin monitoring page
    # (ServiceHealthProbe). Internal mesh only — never an external URL.
    admin.go_fetcher_health_url: '%env(GO_FETCHER_URL)%/healthz'
    admin.go_api_health_url: 'http://go-api:8090/healthz'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            # Doctrine entities are managed objects, never container services.
            - '../src/Entity/'
    App\Service\Client\ClientManager:
        arguments:
            $defaultLocale: 'en_US'
            $appSecret: '%kernel.secret%'

    # S3 client for MinIO (path-style endpoint). Consumed by the flysystem "ddragon.storage".
    ddragon.s3_client:
        class: AsyncAws\S3\S3Client
        arguments:
            $configuration:
                endpoint: '%env(MINIO_ENDPOINT)%'
                accessKeyId: '%env(MINIO_ACCESS_KEY)%'
                accessKeySecret: '%env(MINIO_SECRET_KEY)%'
                region: '%env(MINIO_REGION)%'
                pathStyleEndpoint: true

    # All Data Dragon egress flows through the Go fetch gateway (scoped HTTP client).
    App\Service\Tools\GoFetcherClient:
        arguments:
            $http: '@go_fetcher.client'

    # Resolves the UI locale from the enabled catalogs (see framework.enabled_locales).
    App\Service\I18n\UiLocaleResolver:
        arguments:
            $enabledLocales: '%kernel.enabled_locales%'

    # Account-lifecycle emails. Sender identity is env-driven ("Name <addr>").
    App\Service\Mail\AuthMailer:
        arguments:
            $sender: '%env(MAILER_FROM)%'

    # Contact-form notifications. From = authenticated sender (MAILER_FROM); the
    # destination mailbox is env-driven (CONTACT_RECIPIENT, empty = feature off).
    App\Service\Mail\ContactMailer:
        arguments:
            $sender: '%env(MAILER_FROM)%'
            $recipient: '%env(CONTACT_RECIPIENT)%'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
