security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
    providers:
        # Single admin identity, defined by ADMIN_LOGIN / ADMIN_PASSWORD (plaintext env).
        # A real provider (not an empty memory one) is required so the firewall can
        # refresh the token across requests instead of logging the admin out.
        admin_provider:
            id: App\Security\AdminUserProvider
        # Site accounts (Postgres). UserRepository implements UserLoaderInterface,
        # so lookups accept email OR username, case-insensitively.
        app_user_provider:
            entity:
                class: App\Entity\User
    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        admin:
            pattern: ^/admin
            lazy: true
            provider: admin_provider
            custom_authenticators:
                - App\Security\AdminAuthenticator
            entry_point: App\Security\AdminAuthenticator
            # Brute-force guard on the single admin identity (keyed on username + IP).
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'
            logout:
                path: admin_logout
                target: admin_login
        main:
            lazy: true
            provider: app_user_provider
            # Banned accounts are rejected pre-auth (form login, Google and
            # remember-me alike) with a player-facing translated message.
            user_checker: App\Security\UserChecker
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                default_target_path: app_profile
                username_parameter: _username
                password_parameter: _password
            custom_authenticators:
                - App\Security\GoogleAuthenticator
            # Two authenticators on the firewall: anonymous hits on protected
            # pages must still land on the login form, not the OAuth callback.
            entry_point: form_login
            logout:
                path: app_logout
                target: app_home
                enable_csrf: true
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 2592000 # 30 days
                samesite: lax
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'

    # Note: Only the *first* access control that matches will be used.
    access_control:
        - { path: ^/admin/login, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/profile, roles: ROLE_USER }
        - { path: ^/builds, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            # By default, password hashers are resource intensive and take time. This is
            # important to generate secure password hashes. In tests however, secure hashes
            # are not important, waste resources and increase test times. The following
            # reduces the work factor to the lowest possible values.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
