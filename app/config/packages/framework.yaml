# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'
    csrf_protection: true
    # Note that the session will be started ONLY if you read or write from it.
    session: true

    # Behind Caddy (TLS) -> nginx -> php-fpm. Trust the direct upstream and read the
    # X-Forwarded-* it relays so generated URLs use https and the real client IP is seen.
    trusted_proxies: '%env(TRUSTED_PROXIES)%'
    trusted_headers: ['x-forwarded-for', 'x-forwarded-host', 'x-forwarded-proto', 'x-forwarded-port']

    default_locale: en
    # UI catalogs shipped under translations/. Derived from the selected Data Dragon
    # language by LocaleSubscriber + UiLocaleResolver (2-letter base, zh split by script).
    enabled_locales:
        - ar
        - cs
        - de
        - el
        - en
        - es
        - fr
        - hu
        - id
        - it
        - ja
        - ko
        - pl
        - pt
        - ro
        - ru
        - th
        - tr
        - vi
        - zh_Hans
        - zh_Hant
    translator:
        default_path: '%kernel.project_dir%/translations'
        fallbacks: [en]
        cache_dir: '%kernel.cache_dir%/translations'

    # Throttles the "resend confirmation email" banner action (per authenticated
    # user). Password-reset requests are throttled by the reset-password bundle.
    rate_limiter:
        email_verification:
            policy: 'sliding_window'
            limit: 3
            interval: '15 minutes'
    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
