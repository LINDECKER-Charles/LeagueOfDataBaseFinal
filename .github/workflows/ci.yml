name: CI/CD

# Orchestrator only — wiring + branch guards. All real work lives in reusable
# workflows (_tests, _build, _deploy, _promote), each with a single responsibility.
# No sensitive value here: hosts, paths, domains and app secrets are passed as
# repository secrets / live inside the per-host ENV_FILE.
#
# Two-stage promotion (build once, promote the same artifact):
#   push dev  ─▶ _tests ─▶ merge dev→test ─▶ _build (:sha + :staging) ─▶ _deploy STAGING
#   push main ─▶ _promote (:staging → :prod) ─▶ _deploy PROD
#
# `test` never triggers this workflow. `main` is reached only by a manual test→main
# merge — that human gate promotes to production (prod never rebuilds).
on:
  push:
    branches: [dev, main]

permissions:
  contents: write   # merge-to-test pushes to the test branch
  packages: write   # _build / _promote push & retag on GHCR

jobs:
  # ───────────────────────────────── dev path ────────────────────────────────
  tests:
    if: github.ref == 'refs/heads/dev'
    uses: ./.github/workflows/_tests.yml
    secrets:
      ENV_TEST: ${{ secrets.ENV_TEST }}

  merge-to-test:
    needs: tests
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Merge dev → test (create from main if missing)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --all --prune
          if git show-ref --verify --quiet refs/remotes/origin/test; then
            git checkout -B test origin/test
          else
            git checkout -B test origin/main
          fi
          git merge --no-ff --no-edit "${GITHUB_SHA}"
          git push origin HEAD:test

  build:
    needs: merge-to-test
    if: github.ref == 'refs/heads/dev'
    uses: ./.github/workflows/_build.yml
    with:
      ref: test
      moving_tag: staging

  deploy-staging:
    needs: build
    if: github.ref == 'refs/heads/dev'
    uses: ./.github/workflows/_deploy.yml
    with:
      branch: test
    secrets:
      SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
      SSH_HOST: ${{ secrets.STAGING_HOST }}
      DEPLOY_PATH: ${{ secrets.STAGING_PATH }}
      SSH_USER: ${{ secrets.STAGING_SSH_USER }}
      ENV_FILE: ${{ secrets.ENV_STAGING }}
      ACME_EMAIL: ${{ secrets.ACME_EMAIL }}

  # ──────────────────────────────── main path ────────────────────────────────
  promote:
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_promote.yml
    with:
      source_tag: staging
      target_tags: prod latest

  deploy-prod:
    needs: promote
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_deploy.yml
    with:
      branch: main
    secrets:
      SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
      SSH_HOST: ${{ secrets.PROD_HOST }}
      DEPLOY_PATH: ${{ secrets.PROD_PATH }}
      SSH_USER: ${{ secrets.PROD_SSH_USER }}
      ENV_FILE: ${{ secrets.ENV_PROD }}
      ACME_EMAIL: ${{ secrets.ACME_EMAIL }}
