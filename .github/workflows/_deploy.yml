name: _deploy

# Reusable: deploy the stack to ONE host over SSH. Same logic for staging and prod —
# the environment is fully parameterized by inputs + secrets (DRY / open-closed).
# No environment-specific value is hardcoded here; everything sensitive comes from
# the caller's secrets, and the host config (domains, tags, app secrets) lives in
# ENV_FILE, pushed to the host as .env.
on:
  workflow_call:
    inputs:
      branch:
        description: Branch the target host tracks and pulls (test | main).
        required: true
        type: string
    secrets:
      SSH_KEY:
        description: SSH private key (PEM) for the target host.
        required: true
      SSH_HOST:
        description: Target host (IP or FQDN).
        required: true
      DEPLOY_PATH:
        description: Absolute project path on the host (dir holding compose.*.yaml).
        required: true
      SSH_USER:
        description: SSH user (defaults to root when unset).
        required: false
      ENV_FILE:
        description: Full dotenv for this host, written to ${DEPLOY_PATH}/.env.
        required: true
      ACME_EMAIL:
        description: Let's Encrypt contact for the VPS-global edge proxy (infra/edge).
        required: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Known hosts
        run: ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Push env to host (from ENV_FILE secret)
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          ssh ${{ secrets.SSH_USER || 'root' }}@${{ secrets.SSH_HOST }} "mkdir -p ${{ secrets.DEPLOY_PATH }}"
          printf '%s\n' "$ENV_FILE" \
            | ssh ${{ secrets.SSH_USER || 'root' }}@${{ secrets.SSH_HOST }} "cat > ${{ secrets.DEPLOY_PATH }}/.env"

      - name: Deploy (compose pull + up)
        run: |
          ssh ${{ secrets.SSH_USER || 'root' }}@${{ secrets.SSH_HOST }} <<'EOSSH'
            set -e
            mkdir -p ${{ secrets.DEPLOY_PATH }}
            cd ${{ secrets.DEPLOY_PATH }}
            # Idempotent init: `git clone .` refuse un répertoire non vide (le .env y est
            # déjà poussé à l'étape précédente). `git init` + remote tolère ce cas et
            # `reset --hard` ne touche pas au .env non suivi.
            if [ ! -d .git ]; then
              git init -q
              git remote add origin ${{ secrets.REPO_URL || 'https://github.com/LINDECKER-Charles/LeagueOfDataBaseFinal.git' }}
            fi
            # Deploy overlay (edge labels + external network), WITHOUT
            # compose.override.yaml (dev conveniences).
            export COMPOSE_FILE=compose.yaml:compose.deploy.yaml
            git fetch origin ${{ inputs.branch }}
            git checkout -B ${{ inputs.branch }} origin/${{ inputs.branch }}
            git reset --hard origin/${{ inputs.branch }}
            # ── Edge proxy (VPS-global, idempotent self-heal) ────────────────────
            # Single public TLS entrypoint shared by every project on the host.
            # Ensured on each deploy so a fresh/rebuilt box needs zero manual step:
            # the network, the stack files (from the repo, pinned to a stable path
            # so the bind-mount source never flaps between staging/prod deploys) and
            # the proxy itself are (re)converged before the app comes up.
            docker network inspect edge >/dev/null 2>&1 || docker network create edge
            mkdir -p /opt/edge
            cp infra/edge/compose.yaml infra/edge/Caddyfile /opt/edge/
            printf 'ACME_EMAIL=%s\n' '${{ secrets.ACME_EMAIL }}' > /opt/edge/.env
            docker compose -f /opt/edge/compose.yaml --env-file /opt/edge/.env up -d
            # Pull résilient : le registry casse parfois un layer en cours de copie
            # (connection reset by peer). Retry avec backoff avant d'abandonner, sinon
            # `up` retomberait sur un build local lourd des services à `build:`.
            for attempt in 1 2 3 4 5; do
              if docker compose pull; then break; fi
              [ "$attempt" = 5 ] && { echo "docker compose pull: échec après 5 tentatives" >&2; exit 1; }
              echo "pull échec (tentative $attempt), retry dans $((attempt * 10))s…" >&2
              sleep $((attempt * 10))
            done
            docker compose up -d --remove-orphans
            # Pré-chauffe (détaché → hors chemin critique) : JSON + images des 3 dernières
            # versions dans MinIO, puis backfill WebP. Idempotent + best-effort.
            docker compose exec -d php php bin/console app:ddragon:warmup --limit=3
            docker compose exec -d php php bin/console app:ddragon:webp
            docker image prune -f
          EOSSH
