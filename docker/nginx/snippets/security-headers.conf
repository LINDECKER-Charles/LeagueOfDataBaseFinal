# Constant, environment-agnostic security headers, applied to EVERY response —
# documents, the versioned Vite build, the MinIO-backed image CDN, self-hosted
# fonts and the health probe. `always` sends them on error/non-2xx responses too.
#
# These four are safe in both dev and prod: HSTS is ignored by browsers over
# plain HTTP (dev hits nginx directly on :8080), and the others are inert on
# non-document responses while still hardening the assets we serve.
#
# The environment-SENSITIVE policy — Content-Security-Policy + X-Frame-Options —
# is emitted by App\EventSubscriber\SecurityHeadersSubscriber in prod only, so a
# strict `script-src` never breaks the Symfony profiler toolbar / Vite HMR in
# dev. Keep the two layers in sync when changing the framing/clickjacking stance.
#
# nginx quirk: add_header does NOT inherit into a location that declares its own
# add_header — this snippet is therefore re-`include`d in each such location.
add_header X-Content-Type-Options       "nosniff"                                      always;
add_header Referrer-Policy              "strict-origin-when-cross-origin"              always;
add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains; preload" always;
add_header Cross-Origin-Resource-Policy "same-origin"                                  always;
