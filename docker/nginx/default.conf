# Symfony front-controller + static + MinIO-backed image CDN.
# server_name mirrors the app's domain-based locale split (.fr => fr, else en);
# a single default_server handles both in dev.
server {
    listen 80 default_server;
    server_name league-of-data-base.fr league-of-data-base.com localhost _;

    root /var/www/html/public;
    index index.php;

    # Content-addressed DDragon images, proxied to the MinIO bucket and cached hard.
    # Keys are the SHA-256 of the bytes → immutable forever, so cache for a year.
    location /cdn/ {
        proxy_pass         http://minio:9000/ddragon/;
        proxy_set_header   Host $host;
        proxy_hide_header  X-Amz-Request-Id;
        proxy_hide_header  X-Amz-Id-2;
        proxy_hide_header  Server;
        expires            1y;
        add_header         Cache-Control "public, immutable";
    }

    # Long-cache the versioned asset build output.
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Self-hosted WOFF2 faces (stable filenames) — long cache, CORS-enabled for preload.
    location /fonts/ {
        expires 180d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    # Lightweight liveness probe (no PHP) for the container healthcheck.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Server-Sent Events endpoint (loader warm stream). It must NOT ride the
    # buffered try_files → internal index.php path: an exact-match location wins
    # over everything, so point FastCGI straight at the front controller and turn
    # off every buffer/timeout that would hold frames back or cut a long-but-live
    # warm. This locks the streaming behaviour in nginx instead of relying on the
    # app's X-Accel-Buffering header.
    location = /api/loader/prepare {
        fastcgi_pass         php:9000;
        include              fastcgi_params;
        fastcgi_param        SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param        SCRIPT_NAME     /index.php;
        fastcgi_param        DOCUMENT_ROOT   $document_root;
        fastcgi_read_timeout 3600s;  # a cold warm can stream for minutes; don't cut it
        fastcgi_buffering    off;    # push each SSE frame through instead of buffering
        gzip                 off;    # compression would buffer the stream and defeat SSE
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass  php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $document_root;
        # Prevent access to other .php files
        internal;
    }

    location ~ \.php$ {
        return 404;
    }
}
