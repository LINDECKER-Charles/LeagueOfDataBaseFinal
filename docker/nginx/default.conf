# Staging must never be indexed. The prod-built image serves both staging and
# prod (build-once), so the ONLY signal telling them apart is the Host: staging is
# `test.league-of-data-base.com` (CADDY_DOMAINS in .env.staging). This map yields a
# noindex value for that host (and any `*.test.…` in front of it) and an EMPTY
# string for every prod host — nginx omits an add_header whose value is empty, so
# prod carries no X-Robots-Tag. Emitted via the security-headers snippet, so it
# covers documents AND assets/CDN. Deliberately NOT a robots.txt `Disallow: /`:
# blocking the crawl would stop engines from ever SEEING the noindex, leaving the
# host indexable-but-uncrawled. noindex needs the page to stay crawlable.
map $host $robots_noindex {
    default                                            "";
    "~^([a-z0-9-]+\.)*test\.league-of-data-base\.com$" "noindex, nofollow";
}

# Legacy `.fr` domain retired: every `.fr` host (apex + www) is 301'd to the same
# path on the canonical `.com`, so search engines consolidate all ranking signals
# on one origin and drop the `.fr` from their index. Done here (not in PHP) so a
# retired domain never boots the app — same rationale as the www->apex block. Exact
# server_name outranks the www->apex regex below, so `www.fr` collapses straight to
# `.com` in ONE hop (not www.fr -> apex.fr -> .com). The destination is a literal
# origin, never derived from the client-controlled Host, so it can't be an open
# redirect. `.fr` stays in CADDY_DOMAINS: the edge keeps its cert and routes here
# to be 301'd. `$request_uri` preserves path + query verbatim.
server {
    listen 80;
    server_name league-of-data-base.fr www.league-of-data-base.fr;
    include /etc/nginx/snippets/security-headers.conf;
    # Bounded like the www->apex 301 below: a bare 301 is cached ~permanently by
    # browsers (would pin the retirement client-side, near-impossible to reverse);
    # engines consolidate on the 301 STATUS, not max-age, so 1h keeps the SEO
    # benefit while staying recoverable.
    add_header Cache-Control "public, max-age=3600";
    return 301 https://league-of-data-base.com$request_uri;
}

# Canonical host: a leading `www.` on the live domain is 301'd to its apex, so a
# page answers on a single origin and search engines never split signals between
# the two. Done here (not in PHP) so the redirect never boots the app. The regex
# is scoped to the brand domain — a client-controlled `Host: www.evil.com` must
# not become an open redirect — yet stays env-agnostic (matches the prod apex and
# staging's `www.test.…`). `$request_uri` preserves path + query verbatim.
server {
    listen 80;
    server_name ~^www\.(?<apex>([a-z0-9-]+\.)*league-of-data-base\.com)$;
    include /etc/nginx/snippets/security-headers.conf;
    # A bare 301 is cached heuristically — often permanently — by browsers, which
    # would pin the host policy client-side and be near-impossible to reverse. The
    # 301 STATUS is what search engines consolidate on (SEO signal), not max-age,
    # so bounding it to 1h keeps the SEO benefit while staying recoverable.
    add_header Cache-Control "public, max-age=3600";
    return 301 https://$apex$request_uri;
}

# Symfony front-controller + static + MinIO-backed image CDN. Only the live `.com`
# is served here now — `.fr` is 301'd away by the retirement block above and never
# reaches PHP. `default_server` still catches localhost/dev and any other host.
server {
    listen 80 default_server;
    server_name league-of-data-base.com localhost _;

    root /var/www/html/public;
    index index.php;

    # Constant security headers for every response. Inherited by locations that
    # declare NO add_header of their own (/, index.php, the SSE endpoint); the
    # ones that do re-`include` it, since nginx add_header does not inherit once
    # a child block sets its own.
    include /etc/nginx/snippets/security-headers.conf;

    # Analytics aggregates live in the same (public-read) bucket but must never be
    # reachable from the web. `^~` beats the generic /cdn/ prefix below, so any
    # /cdn/analytics/* request is refused before it can be proxied to MinIO. The
    # app still reads them internally (php -> minio:9000, bypassing nginx).
    location ^~ /cdn/analytics/ {
        return 404;
    }

    # Same rule for the audit journal (audit/{date}.ndjson): security logs live in
    # the public-read bucket for the app's internal reads only, never the web.
    location ^~ /cdn/audit/ {
        return 404;
    }

    # Content-addressed DDragon images, proxied to the MinIO bucket and cached hard.
    # Keys are the SHA-256 of the bytes → immutable forever, so cache for a year.
    location /cdn/ {
        proxy_pass         http://minio:9000/ddragon/;
        proxy_set_header   Host $host;
        proxy_hide_header  X-Amz-Request-Id;
        proxy_hide_header  X-Amz-Id-2;
        proxy_hide_header  Server;
        expires            1y;
        add_header         Cache-Control "public, immutable";
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Long-cache the versioned asset build output.
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri =404;
    }

    # Self-hosted WOFF2 faces (stable filenames) — long cache, CORS-enabled for preload.
    location /fonts/ {
        expires 180d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri =404;
    }

    # Lightweight liveness probe (no PHP) for the container healthcheck.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        include /etc/nginx/snippets/security-headers.conf;
        return 200 "ok\n";
    }

    # Server-Sent Events endpoint (loader warm stream). It must NOT ride the
    # buffered try_files → internal index.php path: an exact-match location wins
    # over everything, so point FastCGI straight at the front controller and turn
    # off every buffer/timeout that would hold frames back or cut a long-but-live
    # warm. This locks the streaming behaviour in nginx instead of relying on the
    # app's X-Accel-Buffering header.
    location = /api/loader/prepare {
        fastcgi_pass         php:9000;
        include              fastcgi_params;
        fastcgi_param        SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param        SCRIPT_NAME     /index.php;
        fastcgi_param        DOCUMENT_ROOT   $document_root;
        fastcgi_read_timeout 3600s;  # a cold warm can stream for minutes; don't cut it
        fastcgi_buffering    off;    # push each SSE frame through instead of buffering
        gzip                 off;    # compression would buffer the stream and defeat SSE
    }

    # PWA: the service worker must revalidate on every check so a deploy ships
    # instantly (SW updates are byte-diffed, a cached copy would pin the old one).
    location = /sw.js {
        add_header Cache-Control "no-cache";
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri =404;
    }

    # PWA manifest with its registered MIME type (absent from stock mime.types).
    location = /manifest.webmanifest {
        types { }
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri =404;
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass  php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $document_root;
        # Prevent access to other .php files
        internal;
    }

    location ~ \.php$ {
        return 404;
    }
}
