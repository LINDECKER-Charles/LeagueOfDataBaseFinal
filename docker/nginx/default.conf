# Symfony front-controller + static + MinIO-backed image CDN.
# server_name mirrors the app's domain-based locale split (.fr => fr, else en);
# a single default_server handles both in dev.
server {
    listen 80 default_server;
    server_name league-of-data-base.fr league-of-data-base.com localhost _;

    root /var/www/html/public;
    index index.php;

    # Content-addressed DDragon images, proxied to the MinIO bucket and cached hard.
    location /cdn/ {
        proxy_pass         http://minio:9000/ddragon/;
        proxy_set_header   Host $host;
        proxy_hide_header  X-Amz-Request-Id;
        proxy_hide_header  X-Amz-Id-2;
        proxy_hide_header  Server;
        expires            30d;
        add_header         Cache-Control "public, immutable";
    }

    # Long-cache the versioned asset build output.
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Lightweight liveness probe (no PHP) for the container healthcheck.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass  php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $document_root;
        # Prevent access to other .php files
        internal;
    }

    location ~ \.php$ {
        return 404;
    }
}
