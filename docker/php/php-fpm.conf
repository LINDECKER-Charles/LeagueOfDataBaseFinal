; Additive overrides for the default [www] pool (php-fpm merges pool sections across files).
[www]
clear_env = no
catch_workers_output = yes
decorate_workers_output = no
ping.path = /ping

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500
