name: lodb

# Production TLS overlay — applied ON TOP of compose.yaml, explicitly and WITHOUT
# compose.override.yaml (which carries dev-only conveniences). The deploy job selects
# the files via COMPOSE_FILE (see .github/workflows/ci.yml):
#
#   COMPOSE_FILE=compose.yaml:compose.prod.yaml docker compose up -d
#
# Caddy becomes the sole public entrypoint (80/443, automatic Let's Encrypt) and
# reverse-proxies to the internal nginx, which is no longer host-published in prod.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"      # HTTP/3 (QUIC)
    environment:
      CADDY_DOMAINS: ${CADDY_DOMAINS:?CADDY_DOMAINS is required (e.g. "example.fr, example.com")}
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL is required (Let's Encrypt contact)}
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # issued certs + ACME account key — MUST persist (LE rate limits)
      - caddy_config:/config
    depends_on:
      nginx:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  caddy_data:
  caddy_config:
