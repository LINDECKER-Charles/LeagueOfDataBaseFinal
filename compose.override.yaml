# Local development overrides (auto-merged by `docker compose`).
# - php/nginx run against the live ./app source (no image rebuild needed to see edits)
# - nginx uses the stock image + bind-mounted public/ and config
# - MinIO console, Mailpit UI and the Go service ports are published for convenience
#
# Prerequisite for a fresh clone (once): `cd app && composer install && npm run build`.

services:
  php:
    build:
      target: php_base   # dev: fast base image; source/vendor/build come from the bind-mount
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
    volumes:
      - ./app:/var/www/html
      - ./docker/php/php-dev.ini:/usr/local/etc/php/conf.d/zz-dev.ini:ro

  nginx:
    build: !reset null
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-8080}:80"   # dev only: hit nginx directly (prod entry is Caddy)
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/public:/var/www/html/public:ro

  go-fetcher:
    ports:
      - "8085:8085"

  minio:
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  mailer:
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "1025:1025"
