name: lodb

# Deployment overlay — applied ON TOP of compose.yaml for ANY served environment
# (staging AND prod), explicitly and WITHOUT compose.override.yaml (dev conveniences).
# The deploy jobs select the files via COMPOSE_FILE (see .github/workflows/_deploy.yml):
#
#   COMPOSE_FILE=compose.yaml:compose.deploy.yaml docker compose up -d
#
# This host is multi-tenant: the public TLS entrypoint is a SINGLE shared edge
# proxy (infra/edge — caddy-docker-proxy) that owns 80/443 for every project on
# the VPS. This stack therefore publishes NO host port; it just declares its
# domains as labels on nginx and joins the external `edge` network. Caddy reads
# the labels, provisions Let's Encrypt certs and reverse-proxies to nginx:80.
#
# staging vs prod differ ONLY by the host .env:
#   COMPOSE_PROJECT_NAME  lodb-staging | lodb-prod  (distinct Compose projects →
#                         no cross-env clobber even on the same host)
#   CADDY_DOMAINS         test.league-of-data-base.com | league-of-data-base.fr, .com
#   IMAGE_TAG             staging | prod  (+ secrets)

services:
  nginx:
    # Reachable by the shared edge proxy over `edge`; still on `default` for the
    # intra-stack link to php/minio. `{{upstreams 80}}` resolves this container's
    # IP on the edge network (CADDY_INGRESS_NETWORKS=edge in the edge stack).
    networks:
      - default
      - edge
    labels:
      caddy: ${CADDY_DOMAINS:?CADDY_DOMAINS is required (e.g. "example.fr, example.com")}
      caddy.reverse_proxy: "{{upstreams 80}}"

  go-api:
    # Public paid API — reached through the SAME shared edge proxy as the site, but
    # on its OWN subdomain (API_CADDY_DOMAINS, e.g. api.example.fr). No host port is
    # published: a fixed :8090 bind would collide between the co-located lodb-staging
    # / lodb-prod stacks. `{{upstreams 8090}}` resolves this container's IP on `edge`.
    networks:
      - default
      - edge
    labels:
      caddy: ${API_CADDY_DOMAINS:?API_CADDY_DOMAINS is required (e.g. "api.example.fr")}
      caddy.reverse_proxy: "{{upstreams 8090}}"

networks:
  # Shared ingress fabric, created once on the host (`docker network create edge`,
  # also ensured idempotently by the deploy job). Owned by no single stack.
  edge:
    external: true
    name: edge
